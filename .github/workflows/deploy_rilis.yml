name: Deploy with Ansible

on:
  release:
    types: [published, edited, prereleased]

permissions:
  contents: read

concurrency:
  group: deploy-rilis
  cancel-in-progress: true

jobs:
  deploy-production:
    # Hanya jalan kalau rilis dari branch development & bukan prerelease,
    # serta event adalah published atau edited
    if: |
      github.event.release.target_commitish == 'development' &&
      github.event.release.prerelease == false &&
      github.event.action == 'published'
    name: Deploy (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Debug Release Info
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Release Action: ${{ github.event.action }}"
          echo "Release Tag: ${{ github.event.release.tag_name }}"
          echo "Pre-release: ${{ github.event.release.prerelease }}"
          echo "Target Commitish: ${{ github.event.release.target_commitish }}"

  deploy-prerelease:
    # Hanya jalan kalau rilis dari branch development & prerelease = true,
    # serta event adalah published atau edited
    if: |
      github.event.release.target_commitish == 'development' &&
      github.event.release.prerelease == true &&
      github.event.action == 'prereleased'
    name: Deploy (Pre-Release)
    runs-on: ubuntu-latest

    steps:
      - name: Debug Release Info
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Release Action: ${{ github.event.action }}"
          echo "Release Tag: ${{ github.event.release.tag_name }}"
          echo "Pre-release: ${{ github.event.release.prerelease }}"
          echo "Target Commitish: ${{ github.event.release.target_commitish }}"
